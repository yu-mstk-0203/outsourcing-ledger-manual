<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" font-family="'Yu Gothic','Noto Sans JP',sans-serif" role="img" aria-label="ルート判定フローチャート。まずQ0で契約監理課が入札契約した案件か（130万円超の工事・50万円超の建設コンサル）を判定し、はいなら対象外。いいえならQ1財務会計システムで起票したか、Q2業務区分は業務委託か、Q3予算費目は12節委託料かの順に判定し、ルートA1・A2・B・対象外のいずれかになる。">
  <rect width="1000" height="900" fill="#FAFAFA"/>
  <text x="500" y="34" font-size="20" font-weight="700" text-anchor="middle" fill="#1A1A1A">あなたはどのルート？（Q0 → Q1 → Q2 → Q3 で判定）</text>
  <text x="500" y="58" font-size="13" text-anchor="middle" fill="#666666">各分岐のラベル（はい／いいえ）に従って進み、右または下の結果に着きます</text>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#18324f"/>
    </marker>
  </defs>

  <!-- Start -->
  <ellipse cx="400" cy="92" rx="82" ry="24" fill="#18324f"/>
  <text x="400" y="97" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">スタート</text>
  <line x1="400" y1="116" x2="400" y2="126" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Q0 -->
  <polygon points="400,128 560,190 400,252 240,190" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="400" y="175" font-size="12" font-weight="700" text-anchor="middle" fill="#18324f">Q0</text>
  <text x="400" y="193" font-size="13" text-anchor="middle" fill="#1A1A1A">契約監理課で入札</text>
  <text x="400" y="211" font-size="13" text-anchor="middle" fill="#1A1A1A">契約した案件ですか？</text>
  <line x1="560" y1="190" x2="618" y2="190" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="589" y="181" font-size="12" font-weight="700" text-anchor="middle" fill="#18324f">はい</text>
  <line x1="400" y1="252" x2="400" y2="276" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="416" y="270" font-size="12" font-weight="700" fill="#666666">いいえ</text>

  <!-- 対象外 (Q0 Yes) -->
  <rect x="620" y="144" width="360" height="92" rx="6" fill="#F0F0F0" stroke="#18324f" stroke-width="2"/>
  <text x="638" y="172" font-size="14" font-weight="700" fill="#18324f">対象外</text>
  <text x="638" y="196" font-size="11" fill="#1A1A1A">130万円超の工事／50万円超の建設コンサル</text>
  <text x="638" y="218" font-size="11" fill="#1A1A1A">→ 契約監理課で入札契約。台帳に登録しない</text>

  <!-- Q1 -->
  <polygon points="400,278 560,340 400,402 240,340" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="400" y="325" font-size="12" font-weight="700" text-anchor="middle" fill="#18324f">Q1</text>
  <text x="400" y="343" font-size="13" text-anchor="middle" fill="#1A1A1A">財務会計システムで</text>
  <text x="400" y="361" font-size="13" text-anchor="middle" fill="#1A1A1A">起票しましたか？</text>
  <line x1="560" y1="340" x2="618" y2="340" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="589" y="331" font-size="12" font-weight="700" text-anchor="middle" fill="#666666">いいえ</text>
  <line x1="400" y1="402" x2="400" y2="426" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="414" y="420" font-size="12" font-weight="700" fill="#18324f">はい</text>

  <!-- Route B (Q1 No) -->
  <rect x="620" y="294" width="360" height="92" rx="6" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="638" y="322" font-size="14" font-weight="700" fill="#18324f">ルートB</text>
  <text x="638" y="346" font-size="11" fill="#1A1A1A">電算外で契約した案件（委託料）</text>
  <text x="638" y="368" font-size="11" fill="#1A1A1A">→ FormBridgeで新規入力（起票区分＝電算外）</text>

  <!-- Q2 -->
  <polygon points="400,428 560,490 400,552 240,490" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="400" y="475" font-size="12" font-weight="700" text-anchor="middle" fill="#18324f">Q2</text>
  <text x="400" y="493" font-size="13" text-anchor="middle" fill="#1A1A1A">業務区分は</text>
  <text x="400" y="511" font-size="13" text-anchor="middle" fill="#1A1A1A">「業務委託」ですか？</text>
  <line x1="560" y1="490" x2="618" y2="490" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="589" y="481" font-size="12" font-weight="700" text-anchor="middle" fill="#666666">いいえ</text>
  <line x1="400" y1="552" x2="400" y2="576" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="414" y="570" font-size="12" font-weight="700" fill="#18324f">はい</text>

  <!-- Route B (Q2 No) -->
  <rect x="620" y="444" width="360" height="92" rx="6" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="638" y="472" font-size="14" font-weight="700" fill="#18324f">ルートB</text>
  <text x="638" y="496" font-size="11" fill="#1A1A1A">業務委託以外（コンサル/工事/物品）で委託料</text>
  <text x="638" y="518" font-size="10" fill="#1A1A1A">→ FormBridgeで新規入力（起票区分＝財務会計から起票）</text>

  <!-- Q3 -->
  <polygon points="400,578 560,640 400,702 240,640" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="400" y="625" font-size="12" font-weight="700" text-anchor="middle" fill="#18324f">Q3</text>
  <text x="400" y="643" font-size="13" text-anchor="middle" fill="#1A1A1A">予算費目は</text>
  <text x="400" y="661" font-size="13" text-anchor="middle" fill="#1A1A1A">「12節 委託料」ですか？</text>
  <line x1="560" y1="640" x2="618" y2="640" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="589" y="631" font-size="12" font-weight="700" text-anchor="middle" fill="#666666">いいえ</text>
  <line x1="400" y1="702" x2="400" y2="728" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="414" y="720" font-size="12" font-weight="700" fill="#18324f">はい</text>

  <!-- Route A2 (Q3 No) -->
  <rect x="620" y="594" width="360" height="92" rx="6" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="638" y="622" font-size="14" font-weight="700" fill="#18324f">ルートA2</text>
  <text x="638" y="646" font-size="11" fill="#1A1A1A">12節 委託料以外の案件</text>
  <text x="638" y="668" font-size="11" fill="#1A1A1A">→ kViewerで「削除対象」のみ送信</text>

  <!-- Route A1 (Q3 Yes) -->
  <rect x="230" y="730" width="340" height="104" rx="6" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <rect x="230" y="730" width="340" height="30" rx="6" fill="#18324f"/>
  <rect x="230" y="753" width="340" height="7" fill="#18324f"/>
  <text x="400" y="751" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">ルートA1（基本ルート）</text>
  <text x="400" y="786" font-size="12" text-anchor="middle" fill="#1A1A1A">12節 委託料・業務委託区分で取込み済み</text>
  <text x="400" y="808" font-size="12" text-anchor="middle" fill="#1A1A1A">→ kViewerで不足項目を追記して送信</text>

  <!-- note -->
  <rect x="40" y="852" width="940" height="34" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="56" y="874" font-size="12" fill="#666666">※「電算外」＝財務会計システムを使用せず契約したケース。委託料でない案件や契約監理課の入札契約案件は対象外です。</text>
</svg>
