<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 770" font-family="'Yu Gothic','Noto Sans JP',sans-serif" role="img" aria-label="ルート判定フローチャート。Q1財務会計システムで起票したか、Q2業務区分は業務委託か、Q3予算費目は12節委託料か、の順に判定し、ルートA1・A2・B・Cのいずれかになる。">
  <rect width="960" height="770" fill="#FAFAFA"/>
  <text x="480" y="34" font-size="20" font-weight="700" text-anchor="middle" fill="#1A1A1A">あなたはどのルート？（Q1 → Q2 → Q3 で判定）</text>
  <text x="480" y="56" font-size="13" text-anchor="middle" fill="#666666">「はい」は下へ、「いいえ」は右の結果へ進みます</text>

  <!-- defs -->
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#18324f"/>
    </marker>
  </defs>

  <!-- Start -->
  <ellipse cx="380" cy="86" rx="80" ry="24" fill="#18324f"/>
  <text x="380" y="91" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">スタート</text>
  <line x1="380" y1="110" x2="380" y2="128" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Q1 -->
  <polygon points="380,132 510,182 380,232 250,182" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="380" y="172" font-size="13" font-weight="700" text-anchor="middle" fill="#18324f">Q1</text>
  <text x="380" y="192" font-size="13" text-anchor="middle" fill="#1A1A1A">財務会計システムで</text>
  <text x="380" y="210" font-size="13" text-anchor="middle" fill="#1A1A1A">起票しましたか？</text>
  <!-- Q1 No -> C -->
  <line x1="510" y1="182" x2="618" y2="182" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="556" y="173" font-size="12" font-weight="700" text-anchor="middle" fill="#666666">いいえ</text>
  <!-- Q1 Yes down -->
  <line x1="380" y1="232" x2="380" y2="280" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="396" y="262" font-size="12" font-weight="700" fill="#18324f">はい</text>

  <!-- Q2 -->
  <polygon points="380,284 510,334 380,384 250,334" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="380" y="324" font-size="13" font-weight="700" text-anchor="middle" fill="#18324f">Q2</text>
  <text x="380" y="344" font-size="13" text-anchor="middle" fill="#1A1A1A">業務区分は</text>
  <text x="380" y="362" font-size="13" text-anchor="middle" fill="#1A1A1A">「業務委託」ですか？</text>
  <!-- Q2 No -> B -->
  <line x1="510" y1="334" x2="618" y2="334" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="556" y="325" font-size="12" font-weight="700" text-anchor="middle" fill="#666666">いいえ</text>
  <!-- Q2 Yes down -->
  <line x1="380" y1="384" x2="380" y2="432" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="396" y="414" font-size="12" font-weight="700" fill="#18324f">はい</text>

  <!-- Q3 -->
  <polygon points="380,436 510,486 380,536 250,486" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="380" y="476" font-size="13" font-weight="700" text-anchor="middle" fill="#18324f">Q3</text>
  <text x="380" y="496" font-size="13" text-anchor="middle" fill="#1A1A1A">予算費目は</text>
  <text x="380" y="514" font-size="13" text-anchor="middle" fill="#1A1A1A">「12節 委託料」ですか？</text>
  <!-- Q3 No -> A2 -->
  <line x1="510" y1="486" x2="618" y2="486" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="556" y="477" font-size="12" font-weight="700" text-anchor="middle" fill="#666666">いいえ</text>
  <!-- Q3 Yes down -> A1 -->
  <line x1="380" y1="536" x2="380" y2="584" stroke="#18324f" stroke-width="2" marker-end="url(#ah)"/>
  <text x="396" y="566" font-size="12" font-weight="700" fill="#18324f">はい</text>

  <!-- Outcome: Route C (Q1 No) -->
  <rect x="620" y="142" width="300" height="80" rx="6" fill="#FFFFFF" stroke="#18324f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="636" y="167" font-size="14" font-weight="700" fill="#18324f">ルートC</text>
  <text x="636" y="189" font-size="12" fill="#1A1A1A">電算外で契約した案件</text>
  <text x="636" y="208" font-size="12" fill="#1A1A1A">→ FormBridge で全項目を新規入力</text>

  <!-- Outcome: Route B (Q2 No) -->
  <rect x="620" y="294" width="300" height="80" rx="6" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="636" y="319" font-size="14" font-weight="700" fill="#18324f">ルートB</text>
  <text x="636" y="341" font-size="12" fill="#1A1A1A">業務区分が「業務委託」以外</text>
  <text x="636" y="360" font-size="12" fill="#1A1A1A">→ FormBridge で全項目を新規入力</text>

  <!-- Outcome: Route A2 (Q3 No) -->
  <rect x="620" y="446" width="300" height="80" rx="6" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <text x="636" y="471" font-size="14" font-weight="700" fill="#18324f">ルートA2</text>
  <text x="636" y="493" font-size="12" fill="#1A1A1A">12節 委託料以外の案件</text>
  <text x="636" y="512" font-size="12" fill="#1A1A1A">→ kViewer で「削除対象」チェックのみ送信</text>

  <!-- Outcome: Route A1 (Q3 Yes) -->
  <rect x="230" y="588" width="300" height="100" rx="6" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
  <rect x="230" y="588" width="300" height="30" rx="6" fill="#18324f"/>
  <rect x="230" y="611" width="300" height="7" fill="#18324f"/>
  <text x="380" y="609" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">ルートA1（基本ルート）</text>
  <text x="380" y="643" font-size="12" text-anchor="middle" fill="#1A1A1A">12節 委託料で財務会計システムから取込み済み</text>
  <text x="380" y="663" font-size="12" text-anchor="middle" fill="#1A1A1A">→ kViewer で不足項目を追記して送信</text>

  <!-- note -->
  <rect x="40" y="716" width="880" height="36" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="56" y="739" font-size="12" fill="#666666">※「電算外」＝財務会計システムを使用せずに契約手続きを行ったケース。判定は必ず Q1→Q2→Q3 の順で確認します。</text>
</svg>
