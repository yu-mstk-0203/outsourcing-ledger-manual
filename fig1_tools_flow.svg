<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Noto Sans CJK JP', 'Noto Sans JP', sans-serif">
  <rect width="900" height="520" fill="#FBFBF9"/>
  <text x="450" y="40" font-size="22" font-weight="700" text-anchor="middle" fill="#1F2937">図1: 3つのツールと情報の流れ</text>

  <g>
    <rect x="40" y="120" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#475569" stroke-width="2"/>
    <rect x="40" y="120" width="200" height="32" rx="8" fill="#475569"/>
    <rect x="40" y="144" width="200" height="8" fill="#475569"/>
    <text x="140" y="142" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">財務会計システム</text>
    <text x="140" y="190" font-size="13" text-anchor="middle" fill="#1F2937">契約情報の起点</text>
    <text x="140" y="212" font-size="12" text-anchor="middle" fill="#4B5563">(施行伺から起票)</text>
    <text x="140" y="244" font-size="11" text-anchor="middle" fill="#6B7280">[各所属で操作]</text>
  </g>

  <g>
    <rect x="350" y="120" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="2" stroke-dasharray="4 3"/>
    <rect x="350" y="120" width="200" height="32" rx="8" fill="#64748B"/>
    <rect x="350" y="144" width="200" height="8" fill="#64748B"/>
    <text x="450" y="142" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">kintone</text>
    <text x="450" y="190" font-size="13" text-anchor="middle" fill="#1F2937">情報の保管庫</text>
    <text x="450" y="212" font-size="12" text-anchor="middle" fill="#4B5563">(契約監理課が管理)</text>
    <text x="450" y="244" font-size="11" text-anchor="middle" fill="#6B7280">[各課は直接触らない]</text>
  </g>

  <g>
    <rect x="660" y="80" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2"/>
    <rect x="660" y="80" width="200" height="28" rx="8" fill="#1E40AF"/>
    <rect x="660" y="100" width="200" height="8" fill="#1E40AF"/>
    <text x="760" y="100" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">Kviewer</text>
    <text x="760" y="138" font-size="12" text-anchor="middle" fill="#1F2937">確認・追記用画面</text>
    <text x="760" y="162" font-size="11" text-anchor="middle" fill="#6B7280">[各課が操作]</text>
  </g>

  <g>
    <rect x="660" y="200" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2"/>
    <rect x="660" y="200" width="200" height="28" rx="8" fill="#1E40AF"/>
    <rect x="660" y="220" width="200" height="8" fill="#1E40AF"/>
    <text x="760" y="220" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">FormBridge</text>
    <text x="760" y="258" font-size="12" text-anchor="middle" fill="#1F2937">新規入力用フォーム</text>
    <text x="760" y="282" font-size="11" text-anchor="middle" fill="#6B7280">[各課が操作]</text>
  </g>

  <g>
    <line x1="240" y1="190" x2="345" y2="190" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="252" y="166" width="80" height="18" rx="3" fill="#FBFBF9"/>
    <text x="292" y="180" font-size="11" text-anchor="middle" fill="#4B5563">取り込み</text>
    <text x="292" y="208" font-size="10" text-anchor="middle" fill="#9CA3AF">(契約監理課)</text>
  </g>

  <g>
    <line x1="550" y1="160" x2="655" y2="130" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="655" y1="250" x2="550" y2="220" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="605" y="195" font-size="10" text-anchor="middle" fill="#9CA3AF">同期</text>
  </g>

  <g>
    <rect x="638" y="58" width="244" height="262" rx="10" fill="none" stroke="#B45309" stroke-width="2" stroke-dasharray="5 3"/>
    <rect x="680" y="44" width="160" height="26" rx="3" fill="#B45309"/>
    <text x="760" y="62" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">あなたが触るのはココ!</text>
  </g>

  <g>
    <rect x="40" y="395" width="820" height="100" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="40" y="395" width="6" height="100" fill="#B45309"/>
    <text x="62" y="425" font-size="14" font-weight="700" fill="#1F2937">ポイント</text>
    <text x="62" y="453" font-size="13" fill="#1F2937">各課職員が直接操作するのは右側の<tspan font-weight="700" fill="#1E40AF"> Kviewer または FormBridge </tspan>の2つだけ。</text>
    <text x="62" y="476" font-size="13" fill="#1F2937">真ん中の kintone は契約監理課が管理する「裏側の倉庫」で、各課が直接触ることはありません。</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
  </defs>
</svg>
