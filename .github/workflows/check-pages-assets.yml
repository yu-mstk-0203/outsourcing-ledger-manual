name: Check Pages assets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 20 * * 0"
  workflow_dispatch:

jobs:
  check-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify local asset references
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const html = fs.readFileSync("index.html", "utf8");
          const refs = [...html.matchAll(/\b(?:src|href)="([^"]+)"/g)]
            .map((match) => match[1])
            .filter((ref) => !/^(https?:|mailto:|tel:|#)/.test(ref))
            .map((ref) => decodeURIComponent(ref.split("#")[0].split("?")[0]))
            .filter(Boolean);
          const missing = refs.filter((ref) => !fs.existsSync(path.join(process.cwd(), ref)));
          if (missing.length) {
            console.error("Missing local assets:");
            for (const ref of missing) console.error(`- ${ref}`);
            process.exit(1);
          }
          console.log(`Checked ${refs.length} local references.`);
          NODE
