<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="'Yu Gothic','Noto Sans JP',sans-serif" role="img" aria-label="図3 ルートAの作業手順。ステップ1は契約監理課が財務会計システムからkintoneへ自動取込み（各課は待つだけ）。ステップ2は各課がkViewerで案件を探す。ステップ3は編集をクリック。ステップ4は空欄を埋めて送信。各課の実作業はステップ2から。">
  <rect width="1000" height="380" fill="#FAFAFA"/>
  <text x="500" y="40" font-size="22" font-weight="700" text-anchor="middle" fill="#1A1A1A">図3: ルートAの作業手順 (4ステップ)</text>
  <text x="500" y="65" font-size="13" text-anchor="middle" fill="#666666">あなたの作業は「追記して送信」だけ。所要時間の目安は5〜10分です。</text>

  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#18324f"/>
    </marker>
  </defs>

  <!-- Step 1（契約監理課の作業＝各課は待つ。ミュート表現） -->
  <g>
    <rect x="40" y="100" width="200" height="180" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    <rect x="40" y="100" width="200" height="38" rx="8" fill="#666666"/>
    <rect x="40" y="130" width="200" height="8" fill="#666666"/>
    <circle cx="68" cy="119" r="14" fill="#FFFFFF"/>
    <text x="68" y="124" font-size="14" font-weight="700" text-anchor="middle" fill="#666666">1</text>
    <text x="155" y="124" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">契約監理課が取込み</text>
    <text x="140" y="180" font-size="12" text-anchor="middle" fill="#1A1A1A">財務会計システムから</text>
    <text x="140" y="200" font-size="12" text-anchor="middle" fill="#1A1A1A">kintoneへ自動取込み</text>
    <line x1="60" y1="225" x2="220" y2="225" stroke="#E0E0E0" stroke-width="1"/>
    <text x="140" y="250" font-size="11" font-weight="700" text-anchor="middle" fill="#666666">[各課は待つだけ]</text>
  </g>

  <line x1="240" y1="190" x2="278" y2="190" stroke="#18324f" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Step 2 -->
  <g>
    <rect x="280" y="100" width="200" height="180" rx="8" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
    <rect x="280" y="100" width="200" height="38" rx="8" fill="#18324f"/>
    <rect x="280" y="130" width="200" height="8" fill="#18324f"/>
    <circle cx="308" cy="119" r="14" fill="#FFFFFF"/>
    <text x="308" y="124" font-size="14" font-weight="700" text-anchor="middle" fill="#18324f">2</text>
    <text x="395" y="124" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">kViewerで案件を探す</text>
    <text x="380" y="180" font-size="12" text-anchor="middle" fill="#1A1A1A">指定URLを開く</text>
    <text x="380" y="200" font-size="12" text-anchor="middle" fill="#1A1A1A">課名・件名で絞り込み</text>
    <line x1="300" y1="225" x2="460" y2="225" stroke="#E0E0E0" stroke-width="1"/>
    <text x="380" y="250" font-size="11" font-weight="700" text-anchor="middle" fill="#18324f">[各課で操作]</text>
  </g>

  <line x1="480" y1="190" x2="518" y2="190" stroke="#18324f" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Step 3 -->
  <g>
    <rect x="520" y="100" width="200" height="180" rx="8" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
    <rect x="520" y="100" width="200" height="38" rx="8" fill="#18324f"/>
    <rect x="520" y="130" width="200" height="8" fill="#18324f"/>
    <circle cx="548" cy="119" r="14" fill="#FFFFFF"/>
    <text x="548" y="124" font-size="14" font-weight="700" text-anchor="middle" fill="#18324f">3</text>
    <text x="635" y="124" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">「編集」をクリック</text>
    <text x="620" y="180" font-size="12" text-anchor="middle" fill="#1A1A1A">画面の左下にある</text>
    <text x="620" y="200" font-size="12" text-anchor="middle" fill="#1A1A1A">「編集」ボタンを押す</text>
    <line x1="540" y1="225" x2="700" y2="225" stroke="#E0E0E0" stroke-width="1"/>
    <text x="620" y="250" font-size="11" font-weight="700" text-anchor="middle" fill="#18324f">[各課で操作]</text>
  </g>

  <line x1="720" y1="190" x2="758" y2="190" stroke="#18324f" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Step 4 -->
  <g>
    <rect x="760" y="100" width="200" height="180" rx="8" fill="#FFFFFF" stroke="#18324f" stroke-width="2"/>
    <rect x="760" y="100" width="200" height="38" rx="8" fill="#18324f"/>
    <rect x="760" y="130" width="200" height="8" fill="#18324f"/>
    <circle cx="788" cy="119" r="14" fill="#FFFFFF"/>
    <text x="788" y="124" font-size="14" font-weight="700" text-anchor="middle" fill="#18324f">4</text>
    <text x="875" y="124" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">空欄を埋めて送信</text>
    <text x="860" y="180" font-size="12" text-anchor="middle" fill="#1A1A1A">必要項目を入力し</text>
    <text x="860" y="200" font-size="12" text-anchor="middle" fill="#1A1A1A">「回答」ボタンで完了</text>
    <line x1="780" y1="225" x2="940" y2="225" stroke="#E0E0E0" stroke-width="1"/>
    <text x="860" y="250" font-size="11" font-weight="700" text-anchor="middle" fill="#18324f">[各課で操作]</text>
  </g>

  <!-- Bottom annotation -->
  <g>
    <rect x="40" y="305" width="920" height="60" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <rect x="40" y="305" width="6" height="60" fill="#18324f"/>
    <text x="62" y="330" font-size="13" fill="#1A1A1A"><tspan font-weight="700" fill="#18324f">ポイント: </tspan>ステップ1は契約監理課が行う作業なので、各課は<tspan font-weight="700" fill="#18324f">ステップ2から</tspan>が実作業です。</text>
    <text x="62" y="352" font-size="12" fill="#666666">基本情報の多くは取込み時に自動入力されているため、ゼロから入力するルートBより大幅に楽に進められます。</text>
  </g>
</svg>
