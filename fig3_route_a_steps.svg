<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="'Noto Sans CJK JP', 'Noto Sans JP', sans-serif">
  <rect width="1000" height="380" fill="#FBFBF9"/>
  <text x="500" y="40" font-size="22" font-weight="700" text-anchor="middle" fill="#1F2937">図3: ルートAの作業手順 (4ステップ)</text>
  <text x="500" y="65" font-size="13" text-anchor="middle" fill="#6B7280">あなたの作業は「追記して送信」だけ。所要時間の目安は5〜10分です。</text>

  <!-- Step 1 -->
  <g>
    <rect x="40" y="100" width="200" height="180" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
    <rect x="40" y="100" width="200" height="38" rx="8" fill="#94A3B8"/>
    <rect x="40" y="130" width="200" height="8" fill="#94A3B8"/>
    <circle cx="68" cy="119" r="14" fill="#FFFFFF"/>
    <text x="68" y="124" font-size="14" font-weight="700" text-anchor="middle" fill="#475569">1</text>
    <text x="155" y="124" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">契約監理課が取込み</text>
    <text x="140" y="180" font-size="12" text-anchor="middle" fill="#1F2937">財務会計システムから</text>
    <text x="140" y="200" font-size="12" text-anchor="middle" fill="#1F2937">kintoneへ自動取込み</text>
    <line x1="60" y1="225" x2="220" y2="225" stroke="#E2E8F0" stroke-width="1"/>
    <text x="140" y="250" font-size="11" font-weight="700" text-anchor="middle" fill="#475569">[各課は待つだけ]</text>
  </g>

  <line x1="240" y1="190" x2="278" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Step 2 -->
  <g>
    <rect x="280" y="100" width="200" height="180" rx="8" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2"/>
    <rect x="280" y="100" width="200" height="38" rx="8" fill="#1E40AF"/>
    <rect x="280" y="130" width="200" height="8" fill="#1E40AF"/>
    <circle cx="308" cy="119" r="14" fill="#FFFFFF"/>
    <text x="308" y="124" font-size="14" font-weight="700" text-anchor="middle" fill="#1E40AF">2</text>
    <text x="395" y="124" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">Kviewerで案件を探す</text>
    <text x="380" y="180" font-size="12" text-anchor="middle" fill="#1F2937">指定URLを開き</text>
    <text x="380" y="200" font-size="12" text-anchor="middle" fill="#1F2937">課名・件名で絞り込み</text>
    <line x1="300" y1="225" x2="460" y2="225" stroke="#DBEAFE" stroke-width="1"/>
    <text x="380" y="250" font-size="11" font-weight="700" text-anchor="middle" fill="#1E40AF">[各課で操作]</text>
  </g>

  <line x1="480" y1="190" x2="518" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Step 3 -->
  <g>
    <rect x="520" y="100" width="200" height="180" rx="8" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2"/>
    <rect x="520" y="100" width="200" height="38" rx="8" fill="#1E40AF"/>
    <rect x="520" y="130" width="200" height="8" fill="#1E40AF"/>
    <circle cx="548" cy="119" r="14" fill="#FFFFFF"/>
    <text x="548" y="124" font-size="14" font-weight="700" text-anchor="middle" fill="#1E40AF">3</text>
    <text x="635" y="124" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">「編集」をクリック</text>
    <text x="620" y="180" font-size="12" text-anchor="middle" fill="#1F2937">画面の左下にある</text>
    <text x="620" y="200" font-size="12" text-anchor="middle" fill="#1F2937">「編集」ボタンを押す</text>
    <line x1="540" y1="225" x2="700" y2="225" stroke="#DBEAFE" stroke-width="1"/>
    <text x="620" y="250" font-size="11" font-weight="700" text-anchor="middle" fill="#1E40AF">[各課で操作]</text>
  </g>

  <line x1="720" y1="190" x2="758" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Step 4 -->
  <g>
    <rect x="760" y="100" width="200" height="180" rx="8" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2"/>
    <rect x="760" y="100" width="200" height="38" rx="8" fill="#1E40AF"/>
    <rect x="760" y="130" width="200" height="8" fill="#1E40AF"/>
    <circle cx="788" cy="119" r="14" fill="#FFFFFF"/>
    <text x="788" y="124" font-size="14" font-weight="700" text-anchor="middle" fill="#1E40AF">4</text>
    <text x="875" y="124" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">空欄を埋めて送信</text>
    <text x="860" y="180" font-size="12" text-anchor="middle" fill="#1F2937">必須項目を入力し</text>
    <text x="860" y="200" font-size="12" text-anchor="middle" fill="#1F2937">「回答」ボタンで完了</text>
    <line x1="780" y1="225" x2="940" y2="225" stroke="#DBEAFE" stroke-width="1"/>
    <text x="860" y="250" font-size="11" font-weight="700" text-anchor="middle" fill="#1E40AF">[各課で操作]</text>
  </g>

  <!-- Bottom annotation -->
  <g>
    <rect x="40" y="305" width="920" height="60" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="40" y="305" width="6" height="60" fill="#B45309"/>
    <text x="62" y="330" font-size="13" fill="#1F2937"><tspan font-weight="700" fill="#B45309">ポイント: </tspan>ステップ1は契約監理課が行う作業なので、各課は<tspan font-weight="700" fill="#B91C1C">ステップ2から</tspan>が実作業です。</text>
    <text x="62" y="352" font-size="12" fill="#4B5563">基本情報の多くは取込み時に自動入力されているため、ゼロから入力するルートBより大幅に楽に進められます。</text>
  </g>

  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
